<html lang="en">
  <head>
    <meta charset="utf-8" />

    <title>OpenGlass 3D AI</title>
    
    <!-- 1. 💡 手机端监控神器：必须放在最前面，确保能抓到所有报错 -->
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>
      // 初始化 vConsole
      window.vConsole = new window.VConsole();
      console.log(">>> [系统] 手机控制台已启动，正在监控代码加载...");
    </script>

    <!-- 2. 3D 渲染引擎 (仅电脑加载) -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <!-- 3. 强力清除旧缓存脚本 -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) { registration.unregister(); }
        });
      }
    </script>

    <style id="expo-reset">
      html, body { height: 100%; margin: 0; background-color: #000; overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>
    <link rel="shortcut icon" href="/openglass-web/favicon.ico" />
  <link rel="shortcut icon" href="/openglass-web/favicon.ico" /></head>
